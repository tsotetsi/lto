# TYPE  DATABASE        USER            ADDRESS                 METHOD
# 1. Allow the 'postgres' superuser to connect locally without a password
# This is essential for the Docker entrypoint and init scripts to run.
local   all             postgres                                trust
# 2. Required for your healthcheck (which connects via -h postgres/TCP)
# We use scram-sha-256 here because we have a healthcheck password.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256
# 3. Allow all other connections from the Docker network
host    all             all             0.0.0.0/0               scram-sha-256