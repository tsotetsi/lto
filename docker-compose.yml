secrets:
  postgres_user:
    file: .secrets/postgres_user.txt
  postgres_password:
    file: .secrets/postgres_password.txt
  healthcheck_user:
    file: .secrets/healthcheck_user.txt
  healthcheck_password:
    file: .secrets/healthcheck_password.txt
  lto_app_user:
    file: .secrets/lto_app_user.txt
  lto_app_password:
    file: .secrets/lto_app_password.txt
  secret_key:
    file: .secrets/secret_key.txt

services:
  backend:
    image: lto-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      ENVIRONMENT: development
      API_URL: http://backend:8000
      POSTGRES_HOST: storage-postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: lto
      POSTGRES_USER_FILE: /run/secrets/lto_app_user
      POSTGRES_PASSWORD_FILE: /run/secrets/lto_app_password
      SECRET_KEY_FILE: /run/secrets/secret_key
      GRAFANA_LOKI_URL: http://loki:3100/loki/api/v1/push
    depends_on:
      storage-postgres:
        condition: service_healthy
      loki:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    secrets:
      - lto_app_user
      - lto_app_password
    networks:
      - lto_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  storage-postgres:
    image: lto-storage-postgres:latest
    build:
      context: ./storage/postgres
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lto
      POSTGRES_HOST: storage-postgres
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
      - healthcheck_user
      - healthcheck_password
      - lto_app_user
      - lto_app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/postgres/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - lto_network
    healthcheck:
      test: ["CMD-SHELL", "PGUSER=$$(cat /run/secrets/healthcheck_user) PGPASSWORD=$$(cat /run/secrets/healthcheck_password) pg_isready -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    build:
      context: ./monitoring/loki
      dockerfile: Dockerfile.loki
    container_name: lto-loki
    #user: "10001:10001"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki:ro
      - loki_data:/loki
    networks:
      - lto_network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1
      start_period: 20s
      interval: 10s
      timeout: 1s
      retries: 12

  # The UI for your logs and metrics.
  grafana:
    image: grafana/grafana:latest
    container_name: lto-grafana
    ports:
      - "9090:9090"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - lto_network
    depends_on:
      - loki

  # The collector that scrapes logs from Docker containers.
  alloy:
    image: grafana/alloy:latest
    container_name: lto-alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    networks:
      - lto_network
    depends_on:
      - loki

  frontend:
    image: lto-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lto_network

networks:
  lto_network:
    driver: bridge
    name: lto_network

volumes:
  postgres_data: {}
  loki_data: {}
  grafana_data: {}